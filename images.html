<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}

.grid img {
  width: 100%;
  aspect-ratio: 1/1;
  object-fit: cover;
  border-radius: 15px;
  transition: all 0.35s ease;
  cursor: pointer;
}

/* center 3rd image */
.grid img:nth-child(3) {
  grid-column: 1 / span 2;
  justify-self: center;
  width: 70%;
}

/* hover */
.grid img:hover {
  transform: scale(1.08);
  box-shadow: 0 10px 25px rgba(255, 120, 150, 0.4);
}
</style>

</head>

<body class="center">
<div class="card">

<p>Don’t worry, these images aren’t going anywhere… they’re safe here</p>

<div class="grid">
  <img src="Image2.jpg" onclick="openImg(this.src)">
  <img src="Image3.jpg" onclick="openImg(this.src)">
  <img src="Image1.jpg" onclick="openImg(this.src)">
</div>

</div>

<button class="back" onclick="history.back()">Go back to previous page</button>

<script src="data.js"></script>

<script>
function openImg(src){
  let viewer = document.createElement("div");
  viewer.style.position = "fixed";
  viewer.style.top = 0;
  viewer.style.left = 0;
  viewer.style.width = "100%";
  viewer.style.height = "100%";
  viewer.style.background = "rgba(0,0,0,0.85)";
  viewer.style.display = "flex";
  viewer.style.alignItems = "center";
  viewer.style.justifyContent = "center";
  viewer.style.zIndex = 999;

  viewer.innerHTML = `<img src="${src}" style="max-width:90%; border-radius:20px;">`;

  viewer.onclick = () => document.body.removeChild(viewer);

  document.body.appendChild(viewer);
}
</script>

</body>
</html>
