<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
</head>

<body class="center">
<div class="card">

<p>Don’t worry, these images aren’t going anywhere… they’re safe here</p>

<div class="grid">
  <img src="https://picsum.photos/200?1">
  <img src="https://picsum.photos/200?2">
  <img src="https://picsum.photos/200?3">
</div>

</div>

<button class="back" onclick="history.back()">Go back to previous page</button>

<script src="data.js"></script>

<script>
function openImg(src){
  let viewer = document.createElement("div");
  viewer.style.position = "fixed";
  viewer.style.top = 0;
  viewer.style.left = 0;
  viewer.style.width = "100%";
  viewer.style.height = "100%";
  viewer.style.background = "rgba(0,0,0,0.8)";
  viewer.style.display = "flex";
  viewer.style.alignItems = "center";
  viewer.style.justifyContent = "center";
  viewer.style.zIndex = 999;

  viewer.innerHTML = `
    <img src="${src}" style="max-width:90%; border-radius:20px;">
  `;

  viewer.onclick = () => document.body.removeChild(viewer);

  document.body.appendChild(viewer);
}
</script>
</body>
</html>
